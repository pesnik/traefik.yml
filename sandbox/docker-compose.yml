services:
  sandbox:
    container_name: aio-sandbox
    image: ghcr.io/agent-infra/sandbox:latest
    security_opt:
      - seccomp:unconfined
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'superset.agentshq.net:172.22.37.131'
    restart: 'unless-stopped'
    shm_size: '2gb'
    mem_limit: '8g'
    # cpus: '4'  # removed - kernel does not support CPU CFS scheduler
    environment:
      PROXY_SERVER: ${PROXY_SERVER:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      DNS_OVER_HTTPS_TEMPLATES: ''
      WORKSPACE: ${WORKSPACE:-"/home/gem"}
      HOMEPAGE: https://localhost/sandbox/
      BROWSER_EXTRA_ARGS: ${BROWSER_EXTRA_ARGS:-}
      TZ: ${TZ:-Asia/Singapore}
      DISPLAY_WIDTH: ${DISPLAY_WIDTH:-1280}
      DISPLAY_HEIGHT: ${DISPLAY_HEIGHT:-1024}
      WAIT_PORTS: '8079,8091'
      VNC_SERVER_PORT: 5900
      PUBLIC_PORT: 8080
      AUTH_BACKEND_PORT: 8081
      WEBSOCKET_PROXY_PORT: 6080
      GEM_SERVER_PORT: 8088
      MCP_HUB_PORT: 8079
      SANDBOX_SRV_PORT: 8091
      JUPYTER_LAB_PORT: 8888
      CODE_SERVER_PORT: 8200
      MCP_SERVER_BROWSER_PORT: 8100
      TINYPROXY_PORT: 8118
      MCP_SERVER_MARKITDOWN_PORT: 8101
      MCP_SERVER_CHROME_DEVTOOLS_PORT: 8102
      BROWSER_REMOTE_DEBUGGING_PORT: 9222
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
      UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.org/simple}
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
      GITHUB_TOKEN: ''
      AIO_SKILLS_PATH: ${AIO_SKILLS_PATH:-}
      DISABLE_JUPYTER: ${DISABLE_JUPYTER:-false}
      DISABLE_CODE_SERVER: ${DISABLE_CODE_SERVER:-false}
      JUPYTER_BASE_URL: /sandbox/jupyter
      CODE_SERVER_BASE_PATH: /sandbox/code
    labels:
      - 'traefik.enable=true'

      # ── UI Service (port 8080) ── https://localhost/sandbox/
      - 'traefik.http.services.aio-sandbox-ui.loadbalancer.server.port=8080'
      - "traefik.http.routers.sandbox-ui.rule=Host(`localhost`) && PathPrefix(`/sandbox`)"
      - 'traefik.http.routers.sandbox-ui.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-ui.tls=true'
      - 'traefik.http.routers.sandbox-ui.service=aio-sandbox-ui'
      - 'traefik.http.middlewares.sandbox-strip.stripprefix.prefixes=/sandbox'
      - 'traefik.http.middlewares.sandbox-headers.headers.customrequestheaders.X-Forwarded-Prefix=/sandbox'
      - 'traefik.http.routers.sandbox-ui.middlewares=sandbox-strip,sandbox-headers'

      # ── API Service (port 8091) ── https://localhost/sandbox/api/
      - 'traefik.http.services.aio-sandbox-api.loadbalancer.server.port=8091'
      - "traefik.http.routers.sandbox-api.rule=Host(`localhost`) && PathPrefix(`/sandbox/api`)"
      - 'traefik.http.routers.sandbox-api.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-api.tls=true'
      - 'traefik.http.routers.sandbox-api.service=aio-sandbox-api'
      - 'traefik.http.middlewares.sandbox-api-strip.stripprefix.prefixes=/sandbox/api'
      - 'traefik.http.middlewares.sandbox-api-headers.headers.customrequestheaders.X-Forwarded-Prefix=/sandbox/api'
      - 'traefik.http.routers.sandbox-api.middlewares=sandbox-api-strip,sandbox-api-headers'        
      # - 'traefik.http.routers.sandbox-api.middlewares=sandbox-api-strip'

      # ── VNC WebSocket (port 6080) ── https://localhost/sandbox/websockify
      - 'traefik.http.services.aio-vnc.loadbalancer.server.port=6080'
      - "traefik.http.routers.sandbox-vnc.rule=Host(`localhost`) && PathPrefix(`/sandbox/websockify`)"
      - 'traefik.http.routers.sandbox-vnc.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-vnc.tls=true'
      - 'traefik.http.routers.sandbox-vnc.service=aio-vnc'
      - 'traefik.http.middlewares.sandbox-vnc-strip.stripprefix.prefixes=/sandbox/websockify'
      - 'traefik.http.routers.sandbox-vnc.middlewares=sandbox-vnc-strip'

      # ── Jupyter Lab (port 8888) ── strip /sandbox but keep /jupyter
      - 'traefik.http.services.aio-jupyter.loadbalancer.server.port=8888'
      - "traefik.http.routers.sandbox-jupyter.rule=Host(`localhost`) && PathPrefix(`/sandbox/jupyter`)"
      - 'traefik.http.routers.sandbox-jupyter.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-jupyter.tls=true'
      - 'traefik.http.routers.sandbox-jupyter.service=aio-jupyter'
      - 'traefik.http.middlewares.sandbox-jupyter-strip.stripprefix.prefixes=/sandbox'
      - 'traefik.http.routers.sandbox-jupyter.middlewares=sandbox-jupyter-strip'

      # ── Code Server (port 8200) ── strip full /sandbox/code
      - 'traefik.http.services.aio-code.loadbalancer.server.port=8200'
      - "traefik.http.routers.sandbox-code.rule=Host(`localhost`) && PathPrefix(`/sandbox/code`)"
      - 'traefik.http.routers.sandbox-code.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-code.tls=true'
      - 'traefik.http.routers.sandbox-code.service=aio-code'
      - 'traefik.http.middlewares.sandbox-code-strip.stripprefix.prefixes=/sandbox/code'
      - 'traefik.http.routers.sandbox-code.middlewares=sandbox-code-strip'

      # ── CDP DevTools WebSocket ──
      - 'traefik.http.services.aio-sandbox-cdp.loadbalancer.server.port=8080'
      - "traefik.http.routers.sandbox-cdp.rule=Host(`localhost`) && PathPrefix(`/sandbox/api/cdp`)"
      - 'traefik.http.routers.sandbox-cdp.entrypoints=websecure'
      - 'traefik.http.routers.sandbox-cdp.tls=true'
      - 'traefik.http.routers.sandbox-cdp.service=aio-sandbox-cdp'
      - 'traefik.http.middlewares.sandbox-cdp-strip.stripprefix.prefixes=/sandbox/api'
      - 'traefik.http.routers.sandbox-cdp.middlewares=sandbox-cdp-strip'
      - 'traefik.http.routers.sandbox-cdp.priority=200'
      - 'traefik.http.routers.sandbox-api.priority=100'

    networks:
      - traefik-network

networks:
  traefik-network:
    external: true
